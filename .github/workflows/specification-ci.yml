name: ARS Specification Compliance

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  compliance:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install reference implementation
      run: cd reference/hermes && pip install -e ".[test]"

    - name: Run compliance tests
      run: cd tests && python -m pytest -v --tb=short

    - name: Verify specification artifacts
      run: python scripts/verify-spec.py

    - name: Summary
      run: |
        echo "## ARS Compliance Results" >> $GITHUB_STEP_SUMMARY
        echo "- Specification: v1.0 (Frozen)" >> $GITHUB_STEP_SUMMARY
        echo "- Implementation: hermes_core" >> $GITHUB_STEP_SUMMARY
