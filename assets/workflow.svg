<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <style>
    text { font-family: monospace; font-size: 11px; fill: #e0e0e0; }
    .title { font-size: 16px; font-weight: bold; fill: #ffffff; }
    rect { rx: 6; ry: 6; }
  </style>
  <rect width="800" height="500" fill="#1a1a2e"/>
  <text x="400" y="30" text-anchor="middle" class="title">Workflow Execution — Four-Gate Pipeline</text>

  <!-- Workflow Definition -->
  <rect x="300" y="55" width="200" height="40" fill="#0f3460" stroke="#1a6bcf" stroke-width="2"/>
  <text x="400" y="80" text-anchor="middle" font-size="12" font-weight="bold">Workflow Definition</text>

  <!-- Arrow down -->
  <line x1="400" y1="95" x2="400" y2="115" stroke="#1a6bcf" stroke-width="2"/>
  <polygon points="395,113 400,123 405,113" fill="#1a6bcf"/>

  <!-- Gate 1: Verification -->
  <rect x="250" y="120" width="300" height="50" fill="#16213e" stroke="#e94560" stroke-width="2"/>
  <text x="400" y="140" text-anchor="middle" font-size="12" font-weight="bold">Gate 1: Verification (Ch8 §8.3)</text>
  <text x="400" y="158" text-anchor="middle" font-size="10">S1–S17 Static Analysis → BLOCKING rules enforced</text>

  <!-- Arrow down -->
  <line x1="400" y1="170" x2="400" y2="190" stroke="#e94560" stroke-width="2"/>
  <polygon points="395,188 400,198 405,188" fill="#e94560"/>

  <!-- Gate 2: Governance -->
  <rect x="250" y="195" width="300" height="50" fill="#16213e" stroke="#e94560" stroke-width="2"/>
  <text x="400" y="215" text-anchor="middle" font-size="12" font-weight="bold">Gate 2: Governance (Ch9 §9.6)</text>
  <text x="400" y="233" text-anchor="middle" font-size="10">Agent check → Policy evaluation → Permission check</text>

  <!-- Arrow down -->
  <line x1="400" y1="245" x2="400" y2="265" stroke="#e94560" stroke-width="2"/>
  <polygon points="395,263 400,273 405,263" fill="#e94560"/>

  <!-- Gate 3: Safety -->
  <rect x="250" y="270" width="300" height="50" fill="#16213e" stroke="#e94560" stroke-width="2"/>
  <text x="400" y="290" text-anchor="middle" font-size="12" font-weight="bold">Gate 3: Safety (Ch8 §8.7)</text>
  <text x="400" y="308" text-anchor="middle" font-size="10">RS1–RS5 → SAFE / RISKY / IRREVERSIBLE</text>

  <!-- Arrow down -->
  <line x1="400" y1="320" x2="400" y2="340" stroke="#e94560" stroke-width="2"/>
  <polygon points="395,338 400,348 405,338" fill="#e94560"/>

  <!-- Gate 4: Execution -->
  <rect x="250" y="345" width="300" height="50" fill="#0f3460" stroke="#1a6bcf" stroke-width="2"/>
  <text x="400" y="365" text-anchor="middle" font-size="12" font-weight="bold">Gate 4: Execution</text>
  <text x="400" y="383" text-anchor="middle" font-size="10">DAG traversal → Action dispatch → Audit recording</text>

  <!-- Arrow down -->
  <line x1="400" y1="395" x2="400" y2="415" stroke="#1a6bcf" stroke-width="2"/>
  <polygon points="395,413 400,423 405,413" fill="#1a6bcf"/>

  <!-- Audit Records -->
  <rect x="280" y="430" width="240" height="40" fill="#1a1a40" stroke="#0f3460" stroke-width="1.5"/>
  <text x="400" y="450" text-anchor="middle" font-size="11">Audit Records (immutable)</text>
  <text x="400" y="463" text-anchor="middle" font-size="9" fill="#888">infrastructure/audit/YYYY/MM/DD.jsonl</text>
</svg>
