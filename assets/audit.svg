<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <style>
    text { font-family: monospace; font-size: 11px; fill: #e0e0e0; }
    .title { font-size: 16px; font-weight: bold; fill: #ffffff; }
    rect { rx: 6; ry: 6; }
  </style>
  <rect width="800" height="400" fill="#1a1a2e"/>
  <text x="400" y="30" text-anchor="middle" class="title">Audit & Commit Lifecycle</text>

  <!-- Step 1: Action Execution -->
  <rect x="50" y="60" width="160" height="45" fill="#0f3460" stroke="#1a6bcf" stroke-width="1.5"/>
  <text x="130" y="80" text-anchor="middle" font-size="11" font-weight="bold">1. Action Execution</text>
  <text x="130" y="95" text-anchor="middle" font-size="9">Ch5 §5.3: produce evidence</text>

  <!-- Step 2: Pending -->
  <rect x="320" y="60" width="160" height="45" fill="#16213e" stroke="#e94560" stroke-width="1.5"/>
  <text x="400" y="80" text-anchor="middle" font-size="11" font-weight="bold">2. Audit Pending</text>
  <text x="400" y="95" text-anchor="middle" font-size="9">Ch6 §6.6.1: write PENDING marker</text>

  <!-- Step 3: State Apply -->
  <rect x="590" y="60" width="160" height="45" fill="#16213e" stroke="#e94560" stroke-width="1.5"/>
  <text x="670" y="80" text-anchor="middle" font-size="11" font-weight="bold">3. State Apply</text>
  <text x="670" y="95" text-anchor="middle" font-size="9">Ch6 §6.6.1: persist side effects</text>

  <!-- Step 4: Committed -->
  <rect x="320" y="150" width="160" height="45" fill="#0f3460" stroke="#1a6bcf" stroke-width="1.5"/>
  <text x="400" y="170" text-anchor="middle" font-size="11" font-weight="bold">4. Audit Committed</text>
  <text x="400" y="185" text-anchor="middle" font-size="9">Ch6 §6.6.1: write COMMITTED marker</text>

  <!-- Failure path -->
  <rect x="320" y="250" width="160" height="45" fill="#1a1a40" stroke="#e94560" stroke-width="1" stroke-dasharray="4"/>
  <text x="400" y="270" text-anchor="middle" font-size="11" font-weight="bold" fill="#e94560">Failed</text>
  <text x="400" y="285" text-anchor="middle" font-size="9" fill="#e94560">Crash between steps → Recovery</text>

  <!-- Arrows -->
  <line x1="210" y1="82" x2="318" y2="82" stroke="#1a6bcf" stroke-width="1.5"/>
  <polygon points="316,78 326,82 316,86" fill="#1a6bcf"/>
  <line x1="480" y1="82" x2="588" y2="82" stroke="#1a6bcf" stroke-width="1.5"/>
  <polygon points="586,78 596,82 586,86" fill="#1a6bcf"/>
  <line x1="670" y1="105" x2="400" y2="148" stroke="#1a6bcf" stroke-width="1.5"/>
  <polygon points="404,146 400,156 396,146" fill="#1a6bcf"/>
  <line x1="400" y1="195" x2="400" y2="248" stroke="#e94560" stroke-width="1" stroke-dasharray="4"/>

  <!-- Recovery cycle -->
  <path d="M 560 270 Q 700 270 700 80 Q 700 30 480 30 L 210 30" fill="none" stroke="#e94560" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="720" y="170" font-size="10" fill="#e94560" transform="rotate(90,720,170)">Recovery (Ch6 §6.9)</text>
</svg>
