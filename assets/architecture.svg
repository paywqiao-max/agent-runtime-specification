<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <style>
    text { font-family: monospace; font-size: 11px; fill: #e0e0e0; }
    .title { font-size: 16px; font-weight: bold; fill: #ffffff; }
    .label { font-size: 10px; fill: #aaa; }
    rect { rx: 6; ry: 6; }
  </style>
  <rect width="800" height="600" fill="#1a1a2e"/>
  <text x="400" y="30" text-anchor="middle" class="title">Hermes Architecture — 6 Layers</text>

  <!-- Layer 6: Infrastructure -->
  <rect x="50" y="50" width="700" height="60" fill="#16213e" stroke="#0f3460" stroke-width="1.5"/>
  <text x="60" y="70" font-size="12" font-weight="bold">Layer 6: Infrastructure</text>
  <text x="60" y="88">Audit Log (append-only) | Dry-Run Reports | State Snapshots</text>
  <text x="600" y="88" font-size="9" fill="#888" text-anchor="end">Ch6 §6.5</text>

  <!-- Layer 5: Execution -->
  <rect x="50" y="130" width="700" height="60" fill="#1a1a40" stroke="#0f3460" stroke-width="1.5"/>
  <text x="60" y="150" font-size="12" font-weight="bold">Layer 5: Execution</text>
  <text x="60" y="168">Actions (atomic) | Pre/Post Conditions | Determinism | Rollback Categories</text>
  <text x="600" y="168" font-size="9" fill="#888" text-anchor="end">Ch5 §5.3</text>

  <!-- Layer 4: Skills -->
  <rect x="50" y="210" width="700" height="60" fill="#16213e" stroke="#0f3460" stroke-width="1.5"/>
  <text x="60" y="230" font-size="12" font-weight="bold">Layer 4: Skills</text>
  <text x="60" y="248">Reusable procedures | Skill composition | Skill lifecycle</text>
  <text x="600" y="248" font-size="9" fill="#888" text-anchor="end">Ch2</text>

  <!-- Layer 3: Workflow -->
  <rect x="50" y="290" width="700" height="60" fill="#1a1a40" stroke="#0f3460" stroke-width="1.5"/>
  <text x="60" y="310" font-size="12" font-weight="bold">Layer 3: Workflow</text>
  <text x="60" y="328">DAG orchestration | Control Flow (seq/cond/parallel/join) | Error Routing</text>
  <text x="600" y="328" font-size="9" fill="#888" text-anchor="end">Ch7 §7.5</text>

  <!-- Layer 2: Knowledge -->
  <rect x="50" y="370" width="700" height="60" fill="#16213e" stroke="#0f3460" stroke-width="1.5"/>
  <text x="60" y="390" font-size="12" font-weight="bold">Layer 2: Knowledge</text>
  <text x="60" y="408">Experiment DB | Repository Index | Knowledge Base</text>
  <text x="600" y="408" font-size="9" fill="#888" text-anchor="end">Ch4 §4.5</text>

  <!-- Layer 1: Policy -->
  <rect x="50" y="450" width="700" height="60" fill="#1a1a40" stroke="#0f3460" stroke-width="1.5"/>
  <text x="60" y="470" font-size="12" font-weight="bold">Layer 1: Policy</text>
  <text x="60" y="488">Policies (behavior contracts) | Conventions (naming, paths)</text>
  <text x="600" y="488" font-size="9" fill="#888" text-anchor="end">Ch1 §1.3</text>

  <!-- Layer 0: Kernel -->
  <rect x="50" y="530" width="700" height="50" fill="#16213e" stroke="#0f3460" stroke-width="1.5"/>
  <text x="60" y="552" font-size="12" font-weight="bold">Layer 0: Research Kernel</text>
  <text x="60" y="568">SOUL (immutable identity) | P0 (Evidence First) through P5 (Dry-Run)</text>
  <text x="600" y="568" font-size="9" fill="#888" text-anchor="end">Ch1, Ch2</text>

  <!-- Arrows -->
  <line x1="400" y1="110" x2="400" y2="128" stroke="#0f3460" stroke-width="2"/>
  <line x1="400" y1="190" x2="400" y2="208" stroke="#0f3460" stroke-width="2"/>
  <line x1="400" y1="270" x2="400" y2="288" stroke="#0f3460" stroke-width="2"/>
  <line x1="400" y1="350" x2="400" y2="368" stroke="#0f3460" stroke-width="2"/>
  <line x1="400" y1="430" x2="400" y2="448" stroke="#0f3460" stroke-width="2"/>
  <line x1="400" y1="510" x2="400" y2="528" stroke="#0f3460" stroke-width="2"/>

  <!-- Side annotations -->
  <text x="760" y="70" font-size="9" fill="#555" text-anchor="end">Ch6</text>
  <text x="760" y="150" font-size="9" fill="#555" text-anchor="end">Ch5</text>
  <text x="760" y="310" font-size="9" fill="#555" text-anchor="end">Ch7</text>
  <text x="760" y="390" font-size="9" fill="#555" text-anchor="end">Ch4</text>
  <text x="760" y="470" font-size="9" fill="#555" text-anchor="end">Ch2</text>
  <text x="760" y="552" font-size="9" fill="#555" text-anchor="end">Ch1</text>
</svg>
