<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350">
  <style>
    text { font-family: monospace; font-size: 11px; fill: #e0e0e0; }
    .title { font-size: 15px; font-weight: bold; fill: #ffffff; }
    rect { rx: 6; ry: 6; }
  </style>
  <rect width="600" height="350" fill="#1a1a2e"/>
  <text x="300" y="30" text-anchor="middle" class="title">Verification & Security Model</text>

  <!-- Phase A: Static Analysis -->
  <rect x="30" y="55" width="250" height="120" fill="#16213e" stroke="#0f3460" stroke-width="1.5"/>
  <text x="155" y="75" text-anchor="middle" font-size="12" font-weight="bold">Phase A: Static Analysis</text>
  <text x="155" y="93" text-anchor="middle" font-size="10" fill="#aaa">Workflow Definition Time</text>
  <text x="45" y="113" font-size="10">S1–S6: Structural checks (DAG, reachability)</text>
  <text x="45" y="128" font-size="10">S7–S11: Contract consistency</text>
  <text x="45" y="143" font-size="10">S12–S14: Sub-workflow checks</text>
  <text x="45" y="158" font-size="10">S15–S17: Error handling</text>
  <text x="220" y="168" font-size="9" fill="#888">Ch8 §8.3</text>

  <!-- Phase B: Safety -->
  <rect x="320" y="55" width="250" height="120" fill="#16213e" stroke="#0f3460" stroke-width="1.5"/>
  <text x="445" y="75" text-anchor="middle" font-size="12" font-weight="bold">Phase B: Safety</text>
  <text x="445" y="93" text-anchor="middle" font-size="10" fill="#aaa">Pre-execution Check</text>
  <text x="335" y="113" font-size="10">RS1: External Service → RISKY+</text>
  <text x="335" y="128" font-size="10">RS2: Non-deterministic → CONDITIONAL</text>
  <text x="335" y="143" font-size="10">RS3: Remote Server → CONDITIONAL</text>
  <text x="335" y="158" font-size="10">RS4: Compensation gap → RISKY+</text>
  <text x="510" y="168" font-size="9" fill="#888">Ch8 §8.7</text>

  <!-- Arrows -->
  <line x1="280" y1="115" x2="318" y2="115" stroke="#1a6bcf" stroke-width="1.5"/>
  <polygon points="316,111 326,115 316,119" fill="#1a6bcf"/>

  <!-- Phase C: Audit Consistency -->
  <rect x="30" y="200" width="250" height="120" fill="#1a1a40" stroke="#0f3460" stroke-width="1.5"/>
  <text x="155" y="220" text-anchor="middle" font-size="12" font-weight="bold">Phase C: Audit Consistency</text>
  <text x="155" y="238" text-anchor="middle" font-size="10" fill="#aaa">Post-execution Validation</text>
  <text x="45" y="258" font-size="10">AC1: Complete node coverage</text>
  <text x="45" y="273" font-size="10">AC2: Parent chain integrity</text>
  <text x="45" y="288" font-size="10">AC3: Timestamp order</text>
  <text x="45" y="303" font-size="10">AC4–5: Terminal + graph match</text>
  <text x="220" y="313" font-size="9" fill="#888">Ch8 §8.5</text>

  <!-- Replay -->
  <rect x="320" y="200" width="250" height="120" fill="#1a1a40" stroke="#0f3460" stroke-width="1.5"/>
  <text x="445" y="220" text-anchor="middle" font-size="12" font-weight="bold">Replay Verification</text>
  <text x="445" y="238" text-anchor="middle" font-size="10" fill="#aaa">Determinism Check</text>
  <text x="335" y="258" font-size="10">RV1: Structural determinism</text>
  <text x="335" y="273" font-size="10">RV2: Audit trace consistency</text>
  <text x="335" y="288" font-size="10">RV3: Non-determinism marked</text>
  <text x="510" y="313" font-size="9" fill="#888">Ch8 §8.6</text>

  <line x1="280" y1="260" x2="318" y2="260" stroke="#1a6bcf" stroke-width="1.5"/>
  <polygon points="316,256 326,260 316,264" fill="#1a6bcf"/>
</svg>
